<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1d1d26"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="redVinyl" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#d83a36"/>
      <stop offset="60%" stop-color="#a8231f"/>
      <stop offset="100%" stop-color="#6e1410"/>
    </radialGradient>
    <linearGradient id="shine" x1="0.15" y1="0.1" x2="0.85" y2="0.9">
      <stop offset="0%" stop-color="#ffd4b0" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffd4b0" stop-opacity="0"/>
      <stop offset="65%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- 红色 vinyl 本体 -->
  <circle cx="512" cy="512" r="420" fill="url(#redVinyl)"/>
  <!-- 同心音轨纹路（暗红）-->
  <g stroke="#5a1410" stroke-width="1.3" fill="none" opacity="0.55">
    <circle cx="512" cy="512" r="400"/>
    <circle cx="512" cy="512" r="382"/>
    <circle cx="512" cy="512" r="365"/>
    <circle cx="512" cy="512" r="345"/>
    <circle cx="512" cy="512" r="325"/>
    <circle cx="512" cy="512" r="305"/>
  </g>
  <!-- 隣字 -->
  <text x="512" y="660"
        font-family="Hiragino Mincho ProN, Noto Serif CJK JP, Songti SC, serif"
        font-size="440"
        text-anchor="middle"
        fill="#f5e8c4"
        font-weight="700">隣</text>
  <!-- 反光斜光 -->
  <circle cx="512" cy="512" r="420" fill="url(#shine)"/>
  <!-- 中心轴孔（在字背后影响小，做亮点更像唱片）-->
  <circle cx="512" cy="512" r="8" fill="#f5e8c4" opacity="0.35"/>
</svg>
