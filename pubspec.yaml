name: tonari
description: "iOS ASMR audio player, organized by DLsite RJ codes."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  file_picker: ^11.0.2
  uuid: ^4.5.3
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  just_audio_background: ^0.0.1-beta.17
  dio: ^5.9.2
  html: ^0.15.6
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
